name: Monthly Ps Index Signal

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  compute-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PS_INDEX_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy scipy

      - name: Compute monthly Ps signals
        env:
          PS_INDEX_PAT: ${{ secrets.PS_INDEX_PAT }}
        run: |
          python live_track_record/scripts/monthly_signal.py

      - name: Commit and push signal readings
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "Ps Index Bot"
          git add live_track_record/signals/
          git diff --staged --quiet && echo "No changes" && exit 0
          git pull --rebase origin main
          git commit -m "Auto: Monthly Ps signal reading $(date +'%Y-%m-%d')"
          git push
