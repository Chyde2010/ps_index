name: Monthly Ps Index Signal

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  compute-signals:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PS_INDEX_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy scipy

      - name: Compute monthly Ps signals
        env:
          PS_INDEX_PAT: ${{ secrets.PS_INDEX_PAT }}
        run: |
          python live_track_record/scripts/monthly_signal.py

      - name: Commit signal readings
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: Monthly Ps signal reading"
          file_pattern: "live_track_record/signals/*"
          commit_user_email: github-actions@github.com
          commit_user_name: Ps Index Bot
          push_options: '--force'
