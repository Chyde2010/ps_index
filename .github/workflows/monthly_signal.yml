name: Monthly Ps Index Signal

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  compute-signals:
    runs-on: ubuntu-latest
    concurrency:
      group: ps-index-signals
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PS_INDEX_PAT }}
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy scipy

      - name: Compute monthly Ps signals
        env:
          PS_INDEX_PAT: ${{ secrets.PS_INDEX_PAT }}
        run: |
          python live_track_record/scripts/monthly_signal.py

      - name: Commit and push signal readings
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "Ps Index Bot"
          git add live_track_record/signals/
          if git diff --staged --quiet; then
            echo "No new signal data to commit"
            exit 0
          fi
          git commit -m "Auto: Monthly Ps signal reading $(date +'%Y-%m-%d')"
          git push --force-with-lease origin main
