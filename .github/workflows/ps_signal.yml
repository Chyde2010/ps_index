name: Ps Index Live Track Record
on:
  # Disabled 2026-07 -- rebalance_portfolio.py
  # now reads from live_signals.csv (monthly_signal.py)
  # generate_signal.py is retained for reference only
  workflow_dispatch:
jobs:
  generate-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy scipy yfinance

      - name: Generate monthly Ps signal
        env:
          GITHUB_PAT: ${{ secrets.PS_INDEX_PAT }}
        run: python live_track_record/generate_signal.py

      - name: Rebalance paper portfolio
        run: python live_track_record/rebalance_portfolio.py

      - name: Commit and push all outputs
        run: |
          git config user.email "chyde2010@github.com"
          git config user.name  "Chyde2010"
          git add live_track_record/
          git diff --cached --quiet || git commit -m \
            "Auto: monthly Ps signal and portfolio rebalance $(date '+%Y-%m')"
          git push
